<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Power of Grace</title>
    <meta name="description" content="Power of Grace" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Power of Grace" />
    <meta property="og:description" content="Power of Grace" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Apply saved theme before React mounts to prevent flash -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('pog-theme');
          var theme = (saved === 'dark' || saved === 'light') ? saved : 'dark';
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
